name: api-ci

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/api-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Keep ruff/mypy separate so failures here don't pull in everything.
          pip install ruff==0.6.4 mypy==1.11.2

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Type check (mypy — non-blocking for now)
        continue-on-error: true
        run: mypy --ignore-missing-imports app

      - name: Run unit tests
        env:
          MAXIMO_BASE_URL: https://maximo.example.test/maximo
          MAXIMO_API_KEY:  test
          JWT_SECRET:      test-secret
        run: pytest --cov=app --cov-report=term-missing -q

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build api image
        run: docker build -f api/Dockerfile -t invopt-api:ci api
