name: ui-ci

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/ui-ci.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/ui-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/dashboard/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
        continue-on-error: true   # raise to false once eslint plugin churn settles

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/dashboard/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: VITE_USE_MSW=true pnpm test:e2e
        env:
          PLAYWRIGHT_HTML_OPEN: never
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/dashboard/playwright-report
