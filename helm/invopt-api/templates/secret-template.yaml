# NOTE: this Secret is normally created OUTSIDE helm (via `oc create secret
# generic ...` or sealed-secrets / external-secrets operator) so cluster
# admins control what credentials are stored.
#
# This template is rendered ONLY when `values.createSecret=true`, which is
# off by default.  Use it for dev / first-run convenience.
{{- if .Values.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretName }}
  labels:
    {{- include "invopt-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  MAXIMO_API_KEY: {{ required "MAXIMO_API_KEY is required" .Values.secretValues.MAXIMO_API_KEY | quote }}
  JWT_SECRET:     {{ required "JWT_SECRET is required" .Values.secretValues.JWT_SECRET | quote }}
  AUDIT_HMAC_SECRET: {{ required "AUDIT_HMAC_SECRET is required" .Values.secretValues.AUDIT_HMAC_SECRET | quote }}
  DATABASE_URL:   {{ .Values.secretValues.DATABASE_URL | default "" | quote }}
  LLM_API_KEY:    {{ .Values.secretValues.LLM_API_KEY | default "" | quote }}
  LLM_ENDPOINT:   {{ .Values.secretValues.LLM_ENDPOINT | default "" | quote }}
{{- end }}
